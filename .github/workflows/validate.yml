name: Validate extension

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate JavaScript syntax
        run: |
          set -euo pipefail
          for file in \
            background.js \
            popup.js \
            optionsEnhancements.js \
            formScanner.js \
            legacySectionAdapter.js \
            formActions.js \
            formAutofillAgent.js \
            siteAdapters.js \
            universalAdapter.js \
            repeatedProfileAdapter.js \
            phoneValueAdapter.js \
            learningMonitor.js \
            mainWorldBridge.js \
            contentScriptV2.js; do
            node --check "$file"
          done

      - name: Validate manifest and architecture
        run: node tests/validate-extension.mjs
