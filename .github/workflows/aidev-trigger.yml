name: Trigger AI Dev Loop

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  aidev:
    if: >
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/aidev') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    uses: yh3970/ai-dev-loop-engine/.github/workflows/ai-dev-loop-volc.yml@main
    with:
      issue_number: ${{ github.event.issue.number }}
      trigger_comment: ${{ github.event.comment.body }}
      base_branch: main
      branch_prefix: ai/issue-
      engine_repository: yh3970/ai-dev-loop-engine
      engine_ref: main
      provider: volcengine
      model: doubao-seed-evolving
      working_directory: .
      max_iterations: 1
      test_command: |
        for f in background.js contentScript.js options.js popup.js aiSemanticMatcher.js; do
          if [ -f "$f" ]; then node --check "$f"; fi
        done
    secrets:
      ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
